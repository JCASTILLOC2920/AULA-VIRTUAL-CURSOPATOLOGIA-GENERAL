<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Virtual - Curso de Patología General</title>
    <!-- Fuentes Modernas: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome para Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Estilos UI/UX 2026 -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="design.css">
</head>
<body>
<div class="premium-container fade-in">

    <!-- BANNER SUPERIOR -->
    <header>
        <!-- Lado Izquierdo: Escudo UNMSM + Botones de Selección -->
        <div class="header-left">
            <div class="logo-container">
                <img src="assets/unmsm_logo.svg" alt="Escudo UNMSM">
            </div>
            
            <div class="nav-toggle-container">
                <button id="btn-cronograma-practico" class="nav-btn active">
                    <i class="fas fa-laptop-medical"></i> <span>Cronograma Práctico</span>
                </button>
                <button id="btn-cronograma-teorico" class="nav-btn">
                    <i class="fas fa-chalkboard-teacher"></i> <span>Cronograma de Clases</span>
                </button>
            </div>
        </div>
        
        <!-- Lado Derecho: Título del Curso + Escudo San Fernando -->
        <div class="header-right">
            <h1>CURSO DE PATOLOGÍA GENERAL</h1>
            <div class="logo-container">
                <img src="assets/san_fernando_logo.png" alt="Escudo Facultad de Medicina San Fernando">
            </div>
        </div>

        <!-- Botón Hamburger para móviles -->
        <button id="hamburger" class="hamburger" aria-label="Abrir menú">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>
    </header>

    <!-- ESTRUCTURA PRINCIPAL -->
    <div class="main-layout">
        
        <!-- MENÚ LATERAL (Semanas) -->
        <aside class="sidebar" id="sidebar">
            <!-- Los botones se generarán dinámicamente desde script.js -->
        </aside>

        <!-- ÁREA CENTRAL (Contenido de la Semana Seleccionada) -->
        <main class="content-area" id="content-area">
            <!-- El contenido se inyectará dinámicamente aquí -->
        </main>
        
    </div>

    <!-- Botón de Asistente de Voz (Voice API) -->
    <button id="voice-assistant-btn" class="voice-btn" aria-label="Comando de voz autónomo">
        <i class="fas fa-microphone"></i>
    </button>

    <!-- Base de Datos del Curso -->
    <script src="data.js"></script>
    <!-- Lógica de Enrutamiento (Islands Architecture local) -->
    <script src="script.js"></script>
</div>
</body>
</html>
